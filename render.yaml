services:
  - type: web
    name: problemlens-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: PRIMARY_PROVIDER
        value: gemini
      - key: FALLBACK_PROVIDER
        value: openai
      - key: ENABLE_SCHEDULER
        value: "true"
      - key: DISCOVERY_INTERVAL_HOURS
        value: "6"
      - key: PIPELINE_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://problemlens.onrender.com,http://localhost:5173
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: LOG_LEVEL
        value: INFO

  - type: web
    name: problemlens
    runtime: static
    rootDir: app
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://problemlens-api.onrender.com/api
