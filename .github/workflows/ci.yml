name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # Job 1 — Backend: pytest
  # ─────────────────────────────────────────
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: backend
        env:
          # Non-empty dummy key so require_env() passes without hitting the API
          GEMINI_API_KEY: "test-dummy-key-ci"
          # Empty = dev mode (pipeline endpoint open, no auth required)
          PIPELINE_API_KEY: ""
        run: python -m pytest --tb=short -q

  # ─────────────────────────────────────────
  # Job 2 — Frontend: vite build
  # ─────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Build
        working-directory: app
        env:
          VITE_API_BASE_URL: "https://problemlens-api.onrender.com/api"
        run: npm run build

  # ─────────────────────────────────────────
  # Job 3 — Docker build check (no push)
  # Runs only after both tests and build pass
  # ─────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t problemlens-backend ./backend

      - name: Build frontend image
        run: |
          docker build \
            -t problemlens-frontend \
            --build-arg VITE_API_BASE_URL=http://localhost:8000/api \
            ./app
